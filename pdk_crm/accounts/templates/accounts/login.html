{% extends "accounts/login_card_base.html" %}
{% load crispy_forms_tags %}

{% block title %}Sign In — PDK ENTRUST{% endblock %}

{% block login_card %}
<h1 class="card-title text-center">Sign In</h1>
<form method="post" novalidate>
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn btn-primary w-100 mt-1">Sign In</button>
</form>
<div class="login-card-links">
    <a href="{% url 'accounts:password_reset' %}">Forgot password</a>
    <span aria-hidden="true"> · </span>
    <a href="{% url 'accounts:authenticator_setup' %}">Set up authenticator</a>
    <span class="d-block mt-1" style="font-size:0.7rem;opacity:0.85;">Forgot password? No current password required.</span>
</div>
{% endblock %}
