{% extends "base.html" %}
{% load crispy_forms_tags static %}

{% block title %}Sign In — PDK ENTRUST{% endblock %}

{% block content %}
<style>
    .login-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
    }

    .login-stack {
        width: 100%;
        max-width: 420px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.75rem;
    }

    .login-brand {
        width: 100%;
        text-align: center;
    }

    .login-logo {
        display: block;
        width: 100%;
        max-width: 360px;
        height: auto;
        margin: 0 auto;
    }

    .login-card {
        width: 100%;
        border-radius: 0.75rem;
    }

    .login-card .card-title {
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: 0.02em;
    }
</style>

<div class="login-page">
    <div class="login-stack">
        <div class="login-brand">
            <img
                src="{% static 'images/pdk-entrust-logo.jpg' %}"
                alt="PDK ENTRUST — Financial &amp; Corporate Services, San Diego, CA"
                class="login-logo"
                width="720"
            >
        </div>

        <div class="card login-card p-4 shadow">
            <h1 class="card-title mb-4 text-center text-light">Sign In</h1>
            <form method="post" novalidate>
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-primary w-100 mt-2">Sign In</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
