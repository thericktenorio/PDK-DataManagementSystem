{% extends "accounts/login_card_base.html" %}
{% load crispy_forms_tags %}

{% block title %}Verify Email — PDK ENTRUST{% endblock %}

{% block login_card %}
<h1 class="card-title text-center">Verify Email</h1>
<p class="login-card-help text-center">Enter the 6-digit code sent to your email.</p>
<form method="post" novalidate>
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn btn-primary w-100 mt-1">Continue</button>
</form>
<div class="login-card-links">
    <a href="{% url 'accounts:password_reset' %}">Start over</a>
</div>
{% endblock %}
