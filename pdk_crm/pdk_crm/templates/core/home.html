{% extends "base.html" %}
{% load static %}

{% block title %}Home{% endblock %}

{% block content %}
<style>
    :root {
        --home-nav-height: 56px;
    }

    main.home-main {
        margin-top: 0;
        padding-top: var(--home-nav-height);
        min-height: 100vh;
        min-height: 100dvh;
    }

    body.home-page {
        overflow-x: hidden;
    }

    .home-hero {
        position: relative;
        min-height: calc(100vh - var(--home-nav-height));
        min-height: calc(100dvh - var(--home-nav-height));
    }

    .home-stage {
        position: relative;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: inherit;
        padding: clamp(1.5rem, 4vh, 2.5rem) clamp(1rem, 3vw, 2rem) clamp(2.5rem, 6vh, 3.5rem);
    }

    .home-glass-panel {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 28px;
        padding: clamp(1.35rem, 3vw, 2.15rem);
        box-shadow:
            0 24px 48px rgba(0, 0, 0, 0.22),
            inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    .home-icon-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(124px, 152px));
        gap: clamp(0.85rem, 2vw, 1.25rem);
        justify-content: center;
    }

    .home-icon-tile {
        aspect-ratio: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.55rem;
        padding: 0.85rem 0.55rem;
        text-decoration: none;
        color: #ffffff;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.07);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow:
            inset 0 1px 0 rgba(255, 255, 255, 0.1),
            0 4px 14px rgba(0, 0, 0, 0.1);
        transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
    }

    .home-icon-tile:hover,
    .home-icon-tile:focus-visible {
        transform: scale(1.15);
        background: rgba(255, 255, 255, 0.14);
        border-color: rgba(255, 255, 255, 0.18);
        color: #ffffff;
        box-shadow:
            inset 0 1px 0 rgba(255, 255, 255, 0.14),
            0 10px 24px rgba(0, 0, 0, 0.18);
        outline: none;
    }

    .home-icon-tile .home-app-icon {
        width: 32px;
        height: 32px;
        padding: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
        filter: var(--dock-icon-blue-filter);
        transition: filter 120ms ease, transform 120ms ease;
    }

    .home-icon-tile:hover .home-app-icon,
    .home-icon-tile:focus-visible .home-app-icon {
        filter: var(--dock-icon-blue-hover-filter);
    }

    .home-icon-label {
        font-size: 0.78rem;
        line-height: 1.15;
        text-align: center;
        max-width: 100%;
        padding: 0 0.15rem;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
    }

    @media (max-width: 420px) {
        .home-icon-grid {
            grid-template-columns: repeat(3, minmax(98px, 1fr));
            gap: 0.7rem;
        }

        .home-icon-tile .home-app-icon {
            width: 28px;
            height: 28px;
        }

        .home-icon-label {
            font-size: 0.68rem;
        }
    }
</style>

<div class="home-hero">
    <div class="home-stage">
        <div class="home-glass-panel">
            <div class="home-icon-grid">
                {% for app in apps %}
                <a href="{% url app.url %}" class="home-icon-tile" aria-label="{{ app.name }}">
                    <img src="{% static app.icon %}" alt="" class="home-app-icon">
                    <span class="home-icon-label">{{ app.name }}</span>
                </a>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
