{% extends "ui/base.html" %} {% block title %} History {% endblock %}
<!-- block content -->
{% block content %}
<h2>Recent Jobs</h2>
<table>
  <thead>
    <tr>
      <th>Created</th>
      <th>Filename</th>
      <th>Status</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    {% for j in jobs %}
    <tr>
      <td>{{ j.created_at }}</td>
      <td>{{ j.filename }}</td>
      <td>{{ j.status }}</td>
      <td><a href="{% url 'ui:results' j.job_uuid %}">View</a></td>
    </tr>
    {% empty %}
    <tr>
      <td colspan="4">No jobs yet.</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
