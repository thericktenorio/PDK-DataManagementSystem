[mypy]
python_version = 3.10
pretty = True

# Warnings
warn_unused_ignores = True
warn_redundant_casts = True
disallow_untyped_defs = False

# Focus mypy only on your code; exclude venvs, site-packages, build artifacts, and Django migrations.
exclude = (\.venv|build|dist|migrations|^pdf_manager/manage\.py$)

# Be pragmatic about 3rd party libraries until stub packages are added
ignore_missing_imports = True
follow_imports = silent
