    reason: single-page drag artifact; not a complete return

# Tag glossary (for filters and test parametrization)
tag_glossary:
  personal: Form 1040 individual client packet
  scorp: Form 1120-S S corporation packet
  tpg: Tax Products Group fee / bank-product pages in outline
  epayments: ACH / direct-deposit authorization pages
  balance_due: Includes at least one payment voucher outline
  federal_payment_voucher: Outline includes 1040V or equivalent
  ca_payment_voucher: Outline includes California 3582-V
  ny_payment_voucher: Outline includes New York 201V (or similar *V title)
  vt_payment_voucher: Outline includes Vermont IN116V (or similar)
  multi_state: Three or more state jurisdictions in outline tree
  ca_state: California forms or worksheets in outline
  ny_state: New York forms or worksheets in outline
  vt_state: Vermont forms in outline
  watermark: Drake export includes visible watermark layer
  no_watermark: No watermark (or NoWaterMark in export filename)
