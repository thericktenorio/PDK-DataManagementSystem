[tool.ruff]
target-version = "py310"
line-length = 100

# Enable common rule sets; extend as needed
[tool.ruff.lint]
select = [
    "E", "F", "W",      # Pycodestyle/Pyflakes
    "I",                # Import sorting
    "UP",               # Pyupgrade
    "B",                # Bugbear
    "SIM",              # Simplify
    "ISC",              # Implicit string concat
    "PIE",              # Misc lints
    "TID",              # Tidiness
    "PT",               # Pytest style
]
ignore = [
    "E203",     # whitespace before ':', conflicts w/ some formatters but fine w/ Ruff formatters
    "ISC001",   # recommended to include in ignore but can still run if abscent from ignore
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101"]   # allow assert in tests, if you enable security rules later

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true